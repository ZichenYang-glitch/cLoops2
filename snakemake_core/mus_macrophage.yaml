  annotation: "-net -p 16"
  plot_domain_extra: "-log -1D -corr -p 16"
  plot_loop_extra: "-triu -1D -m obs -log -vmax 1 -p 16"
  plot_filtered_extra: "-triu -log -1D -p 16"
  plot_arch_extra: "-1D -arch -aw 0.5 -p 16"
